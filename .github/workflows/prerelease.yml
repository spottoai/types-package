name: Prerelease and Publish

on:
  push:
    branches: [main]
  workflow_dispatch: # 允许手动触发

concurrency:
  group: prerelease-main
  cancel-in-progress: false

jobs:
  prerelease:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    # A merged PR already emits a push to main; one trigger avoids duplicate releases.
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history for version comparison
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Bump prerelease version
        id: version-bump
        run: |
          # Get current version
          CURRENT_VERSION=$(npm pkg get version | tr -d '"')
          echo "Current version: $CURRENT_VERSION"

          # Check if it's already a prerelease version
          if [[ $CURRENT_VERSION == *"-"* ]]; then
            # If it's already a prerelease version, increment the prerelease number
            NEW_VERSION=$(npm version prerelease --no-git-tag-version)
          else
            # If it's not a prerelease version, create the first prerelease version
            NEW_VERSION=$(npm version prerelease --no-git-tag-version)
          fi

          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Commit locally first so the published package records this exact git head.
          git add package.json package-lock.json
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"

      - name: Push version commit
        run: git push origin HEAD:main

      - name: Publish to npm
        run: npm publish --access public --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git tag
        run: |
          git tag ${{ steps.version-bump.outputs.new_version }}
          git push origin ${{ steps.version-bump.outputs.new_version }}

      - name: Summary
        run: |
          echo "✅ Successfully published version ${{ steps.version-bump.outputs.new_version }} to npm"
          echo "📦 Package: @spottoai/types-package"
          echo "🏷️  Tag: ${{ steps.version-bump.outputs.new_version }}"
